services:
  db:
    image: postgres:16-alpine
    container_name: fittrack-db
    environment:
      POSTGRES_DB: ${DB_NAME:-fittrack}
      POSTGRES_USER: ${DB_USER:-fittrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fittrack}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fittrack} -d ${DB_NAME:-fittrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fittrack-app
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fittrack}
      DB_USER: ${DB_USER:-fittrack}
      DB_PASSWORD: ${DB_PASSWORD:-fittrack}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # Servicio auxiliar: Java 17 + Maven dentro del contenedor (no se levanta con "docker compose up")
  maven:
    image: maven:3.9-eclipse-temurin-17
    profiles: ["tools"]
    working_dir: /app
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    environment:
      MAVEN_OPTS: -XX:+TieredCompilation -XX:TieredStopAtLevel=1

volumes:
  postgres_data:
  maven_cache:
